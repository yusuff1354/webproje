<body class="d-flex flex-column min-vh-100">

            </div>
        </div>
    </header>

    <nav class="navbar navbar-expand-lg navbar-dark py-3">
        <div class="container justify-content-center gap-3">
            <a class="btn btn-outline-light fw-bold px-3" href="hakkimda.html">HakkńĪmda</a>
            <a class="btn btn-outline-light fw-bold px-3" href="cv.html">√Ėzge√ßmiŇü (CV)</a>
            <a class="btn btn-outline-light fw-bold px-3" href="sehrim.html">Ňěehrim</a>
            <a class="btn btn-outline-light fw-bold px-3" href="mirasvetakim.html">MirasńĪmńĪz ve TakńĪmńĪmńĪz</a>
            <a class="btn btn-outline-light fw-bold px-3" href="ilgialanlarim.html">ńįlgi AlanlarńĪm</a>

    </nav>

    <div id="app" class="container my-5 flex-grow-1">
        <div class="row justify-content-center">
            <main class="col-lg-8 col-md-12">
                <div class="bg-white p-4 rounded shadow-sm">
                    <h2 class="mb-4 border-bottom pb-2">Benimle ńįletiŇüime Ge√ßin</h2>

                    <form id="iletisimform" action="php/iletisim.php" method="POST">

                        <div class="mb-3">
                            <label for="adSoyad" class="form-label">AdńĪnńĪz SoyadńĪnńĪz:</label>
                            <input type="text" v-model="adsoyad" class="form-control" id="adSoyad" name="adSoyad"
                                placeholder="Ad Soyad">
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">E-posta Adresiniz:</label>
                            <input type="email" v-model="email" class="form-control" id="email" name="email"
                                placeholder="ornek@mail.com">
                        </div>

                        <div class="mb-3">
                            <label for="telefon" class="form-label">Telefon NumaranńĪz:</label>
                            <input type="tel" v-model="telefon" class="form-control" id="telefon" name="telefon"
                                placeholder="05XXXXXXXXX">
                        </div>

                        <div class="mb-3">
                            <label for="konu" class="form-label">Konu:</label>
                            <select v-model="konu" class="form-select" id="konu" name="konu">
                                <option value="">Se√ßiniz...</option>
                                <option value="√Ėneri">√Ėneri</option>
                                <option value="Ňěikayet">Ňěikayet</option>
                                <option value="ńįletiŇüim">Genel ńįletiŇüim</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Cinsiyetiniz:</label>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" v-model="cinsiyet" name="cinsiyet"
                                    id="kadin" value="KadńĪn">
                                <label class="form-check-label" for="kadin">KadńĪn</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" v-model="cinsiyet" name="cinsiyet"
                                    id="erkek" value="Erkek">
                                <label class="form-check-label" for="erkek">Erkek</label>
                            </div>
                        </div>

                        <div class="mb-3 form-check">
                            <input type="checkbox" v-model="onay" class="form-check-input" id="onayKutusu">
                            <label class="form-check-label" for="onayKutusu">Bilgilerimin dońüruluńüunu
                                onaylńĪyorum.</label>
                        </div>

                        <div class="mb-3">
                            <label for="mesaj" class="form-label">MesajńĪnńĪz (Max 180 Karakter):</label>
                            <textarea v-model="mesaj" class="form-control" id="mesaj" name="mesaj" rows="4"></textarea>
                        </div>

                        <div class="row g-2">
                            <div class="col-6">
                                <button type="button" onClick="nativeKontrol()" class="btn btn-primary w-100">G√∂nder
                                    (Native JS)</button>
                            </div>
                            <div class="col-6">
                                <button type="button" @click="vueKontrol" class="btn btn-success w-100">G√∂nder
                                    (Vue.js)</button>
                            </div>
                        </div>
                    </form>
                </div>
            </main>
        </div>
    </div>

    <footer class="text-white text-center py-2 mt-auto" style="background-color: #1E2124;">
        <div class="container">
            <p class="mb-0">&copy; 2026 - Yusuf Sunav</p>
        </div>
    </footer>

    <script>
        // 1. NATIVE JAVASCRIPT DENETńįMńį
        function nativeKontrol() {
            var adsoyad = document.getElementById("adSoyad").value;
            var email = document.getElementById("email").value;
            var mesaj = document.getElementById("mesaj").value;
            var telefon = document.getElementById("telefon").value;
            var onay = document.getElementById("onayKutusu").checked;
            var mailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (adsoyad.length < 3) { alert("Native JS: Ge√ßerli bir ad giriniz!"); return; }
            if (!mailRegex.test(email)) { alert("Native JS: Ge√ßerli bir e-posta giriniz!"); return; }
            if (telefon.length != 11 || isNaN(telefon)) { alert("Native JS: Telefon 11 haneli rakam olmalńĪdńĪr!"); return; }
            if (mesaj.length > 180) { alert("Native JS: Mesaj en az 180 karakter olmalńĪdńĪr!"); return; }
            if (!onay) { alert("Native JS: Onay kutusunu iŇüaretleyiniz!"); return; }

            document.getElementById("iletisimform").submit();
        }

        // 2. VUE.JS FRAMEWORK DENETńįMńį
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    adsoyad: '', email: '', telefon: '', konu: '',
                    cinsiyet: 'Erkek', onay: false, mesaj: ''
                }
            },
            methods: {
                vueKontrol() {
                    const mailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

                    if (this.adsoyad.length < 3) { alert("Vue.js: Ad √ßok kńĪsa!"); return; }
                    if (!mailRegex.test(this.email)) { alert("Vue.js: E-posta hatalńĪ!"); return; }
                    if (this.telefon.length != 11) { alert("Vue.js: Telefon 11 hane olmalńĪ!"); return; }
                    if (this.mesaj.length > 180) { alert("Vue.js: Mesaj 180 karakterden az!"); return; }
                    if (!this.onay) { alert("Vue.js: Onay kutusu gerekli!"); return; }

                    document.getElementById("iletisimform").submit();
                }
            }
        }).mount('#app');
    </script>
</body>

</html>
