<body class="d-flex flex-column min-vh-100">

    <header class="text-white py-4" style="background-color: #1A2B4C;">

        </div>
    </header>

    <nav class="navbar navbar-expand-lg navbar-dark py-3">/*bak buraya*/
        <div class="container justify-content-center gap-3">
            <a class="btn btn-outline-light fw-bold px-3" href="hakkimda.html">Hakkımda</a>
            <a class="btn btn-outline-light fw-bold px-3" href="cv.html">Özgeçmiş (CV)</a>
            <a class="btn btn-outline-light fw-bold px-3" href="sehrim.html">Şehrim</a>
            <a class="btn btn-outline-light fw-bold px-3" href="mirasvetakim.html">Mirasımız ve Takımımız</a>
            <a class="btn btn-outline-light fw-bold px-3" href="ilgialanlarim.html">İlgi Alanlarım</a>
            <a class="btn fw-bold px-3 text-white" href="#"
                style="background-color: #008080; border: none;">İletişim</a>

        <a class="btn btn-outline-light fw-bold px-3 ms-3 me-3" href="login.html">Login</a>
    </nav>

    <div class="container my-5 flex-grow-1">
        <div class="row justify-content-center">
            <main class="col-lg-8 col-md-12">
                <div class="bg-white p-4 rounded shadow-sm h-100">
                    <h2 class="mb-4 border-bottom pb-2">Benimle İletişime Geçin</h2>

                    <form id="iletisimform" action="php/iletisim.php" method="POST">

                        <div class="mb-3">
                            <label for="adSoyad" class="form-label">Adınız Soyadınız:</label>
                            <input type="text" class="form-control" id="adSoyad" name="adSoyad"
                                placeholder="Adınızı ve soyadınızı girin" required>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label">E-posta Adresiniz:</label>
                            <input type="email" class="form-control" id="email" name="email"
                                placeholder="ornek@sakarya.edu.tr" required>
                        </div>

                        <div class="mb-3">
                            <label for="telefon" class="form-label">Telefon Numaranız:</label>
                            <input type="tel" class="form-control" id="telefon" name="telefon"
                                placeholder="05XX XXX XX XX" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Cinsiyetiniz:</label>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="cinsiyet" id="kadin" value="Kadın">
                                <label class="form-check-label" for="kadin">Kadın</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="cinsiyet" id="erkek" value="Erkek"
                                    checked>
                                <label class="form-check-label" for="erkek">Erkek</label>
                            </div>
                        </div>


                        <div class="mb-3">
                            <label for="mesaj" class="form-label">Mesajınız:</label>
                            <textarea class="form-control" id="mesaj" name="mesaj" rows="4"
                                placeholder="Mesajınızı buraya yazın..." required></textarea>
                        </div>


                        <button type="button" onClick="js:KontrolFonksiyonu()" class="btn text-white w-100"
                            style="background-color: #008080;">Gönder</button>
                    </form>

                </div>
            </main>
        </div>
    </div>

    <footer class="text-white text-center py-4 mt-auto">
        <div class="container">
            <p class="mb-0">&copy; 2026 - Web Teknolojileri</p>
        </div>
    </footer>

    <script>
        function KontrolFonksiyonu() {
            var adsoyad = document.getElementById("adSoyad").value;
            var email = document.getElementById("email").value;
            var mesaj = document.getElementById("mesaj").value;
            var telefon = document.getElementById("telefon").value;
            var onay = document.getElementById("onayKutusu").checked;

            if (adsoyad.length < 3) {
                alert("Lütfen geçerli bir ad giriniz!");
                return false;
            }
            if (email == '') {
                alert("Lütfen eposta adresini boş bırakmayınız!");
                return false;
            }
            if (mesaj.length > 180) {
                alert("Lütfen mesajınızı en az 180 karakter olacak şekilde yazınız!");
                return false;
            }
            if (telefon.length > 11 || telefon == '') {
                alert("Lütfen geçerli bir telefon numarası giriniz!");
                return false;
            }

            document.forms["iletisimform"].submit();
        }
    </script>

</body>
